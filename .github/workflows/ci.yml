name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build
        run: mvn clean package -DskipTests

      - name: Test (H2 in-memory)
        run: mvn test

      - name: Docker build
        run: docker build -t chat-app:${{ github.sha }} .
